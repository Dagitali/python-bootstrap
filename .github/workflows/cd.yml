#
# GitHub Actions workflow for tagged action releases.
#
# Responsibilities
# - Validate the tagged repository action before publication.
# - Publish a GitHub Release for immutable action-version tags.
#
# Maintainer Notes
# - GitHub Release note categories are configured separately in
#   `.github/release.yml`.
# - This repository publishes a GitHub Action from source tags; it does not
#   build or publish Python distributions.
# - Global permissions are intentionally omitted; each job declares the minimum
#   permissions it needs.
# - External GitHub Actions are pinned to full commit SHAs to reduce
#   supply-chain risk.
# - The dynamic run name is part of the workflow contract: it should identify
#   the tagged version for release clarity.
#
# References
# - GitHub Actions metadata syntax: https://docs.github.com/en/actions/sharing-automations/creating-actions/metadata-syntax-for-github-actions
# - GitHub Release documentation: https://docs.github.com/en/repositories/releasing-projects
# - GitHub Actions expressions reference: https://docs.github.com/en/actions/learn-github-actions/expressions
# - GitHub Actions security hardening guide: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
# - GitHub Actions workflow syntax reference: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions

---

name: Release

run-name: Release ${{ github.ref_name }}

on:
  push:
    tags: ['v*.*.*']

permissions: {}

jobs:
  validate-tagged-action:
    name: Validate tagged action on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # Pinned v6.0.3
      - name: Run local action
        uses: ./
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify requested Python is active
        shell: bash
        run: |
          python --version
          python - <<'PY'
          import platform
          import sys

          expected = "${{ matrix.python-version }}"
          actual = platform.python_version()
          print(f"expected={expected}")
          print(f"actual={actual}")
          if not actual.startswith(expected + "."):
              sys.exit(f"Expected Python {expected}.x, got {actual}")
          PY

  validate-tagged-action-options:
    name: Validate tagged action optional inputs on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # Pinned v6.0.3
      - name: Run local action with pip options
        uses: ./
        with:
          python-version: '3.13'
          pip-version: '25.0'
          upgrade-pip: 'false'
          pip-install: 'packaging==25.0'
      - name: Verify optional input behavior
        shell: bash
        run: |
          python - <<'PY'
          import importlib.metadata

          pip_version = importlib.metadata.version("pip")
          version = importlib.metadata.version("packaging")
          print(f"pip={pip_version}")
          print(f"packaging={version}")
          if pip_version != "25.0":
              raise SystemExit(f"Expected pip 25.0, got {pip_version}")
          if version != "25.0":
              raise SystemExit(f"Expected packaging 25.0, got {version}")
          PY

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [validate-tagged-action, validate-tagged-action-options]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # Pinned v6.0.3
      - name: Publish GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # Pinned v3.0.0
        with:
          generate_release_notes: true
