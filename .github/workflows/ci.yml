#
# GitHub Actions workflow for continuous integration (CI).
#
# Responsibilities
# - Smoke-test the composite action itself across a matrix of Python versions
#   and pip configuration options to verify the action works end-to-end.
#
# Maintainer Notes
# - Global permissions are intentionally omitted; each job declares the minimum
#   permissions it needs.
# - External GitHub Actions are pinned to full commit SHAs to reduce supply-
#   chain risk.
#
# References
# - GitHub Actions workflow syntax reference: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
# - GitHub composite action guide: https://docs.github.com/en/actions/creating-actions/creating-a-composite-action

---

name: CI

run-name: >-
  ${{
    github.event_name == 'pull_request' &&
    format('CI: {0} -> {1}', github.head_ref, github.base_ref) ||
    github.event_name == 'merge_group' &&
    format('CI: merge queue for {0}', github.ref_name) ||
    'CI: manual dispatch'
  }}

on:
  pull_request:
    branches:
      - main
      - develop
  merge_group:
    branches:
      - main
      - develop
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  smoke:
    name: Smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # Pinned v6.0.3

      - name: Run action — default options
        uses: ./
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run action — skip pip upgrade
        uses: ./
        with:
          python-version: ${{ matrix.python-version }}
          upgrade-pip: 'false'

      - name: Run action — pin pip version
        uses: ./
        with:
          python-version: ${{ matrix.python-version }}
          pip-version: '25.0.1'

      - name: Run action — install a dependency
        uses: ./
        with:
          python-version: ${{ matrix.python-version }}
          pip-install: 'requests'
