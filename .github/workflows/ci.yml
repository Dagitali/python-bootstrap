#
# GitHub Actions workflow for continuous integration (CI).
#
# Responsibilities
# - Run cross-platform validation for the repository action.
# - Confirm the action can provision the requested Python runtime on supported
#   GitHub-hosted runner operating systems.
# - Keep heavier action compatibility checks separate from the faster PR gate.
#
# Maintainer Notes
# - Global permissions are intentionally omitted; each job declares the minimum
#   permissions it needs.
# - External GitHub Actions are pinned to full commit SHAs to reduce supply-
#   chain risk.
# - Keep required pull-request and merge-queue gates in `pr.yml`.
# - The dynamic run name is part of the workflow contract: it should identify
#   the short-lived source branch and the long-running target branch for PR
#   review clarity.
#
# References
# - GitHub Actions metadata syntax: https://docs.github.com/en/actions/sharing-automations/creating-actions/metadata-syntax-for-github-actions
# - GitHub Actions expressions reference: https://docs.github.com/en/actions/learn-github-actions/expressions
# - GitHub Actions security hardening guide: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
# - GitHub Actions workflow syntax reference: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
# - GitHub pull request documentation: https://docs.github.com/en/pull-requests
# - GitHub merge queue documentation: https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/configuring-merge-queues

---

name: CI

run-name: >-
  ${{
    github.event_name == 'pull_request' &&
    format('CI: {0} -> {1}', github.head_ref, github.base_ref) ||
    github.event_name == 'merge_group' &&
    format('CI: merge queue for {0}', github.ref_name) ||
    'CI: manual dispatch'
  }}

on:
  pull_request:
    branches:
      # Long-lived GitFlow branches
      - main
      - develop
  merge_group:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions: {}

jobs:
  action-compatibility:
    name: Action on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # Pinned v6.0.3
      - name: Run local action
        uses: ./
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify requested Python is active
        shell: bash
        run: |
          python --version
          python - <<'PY'
          import platform
          import sys

          expected = "${{ matrix.python-version }}"
          actual = platform.python_version()
          print(f"expected={expected}")
          print(f"actual={actual}")
          if not actual.startswith(expected + "."):
              sys.exit(f"Expected Python {expected}.x, got {actual}")
          PY

  optional-inputs:
    name: Optional inputs on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # Pinned v6.0.3
      - name: Run local action with pip options
        uses: ./
        with:
          python-version: '3.13'
          pip-version: '25.0'
          upgrade-pip: 'false'
          pip-install: 'packaging==25.0'
      - name: Verify optional input behavior
        shell: bash
        run: |
          python - <<'PY'
          import importlib.metadata

          pip_version = importlib.metadata.version("pip")
          version = importlib.metadata.version("packaging")
          print(f"pip={pip_version}")
          print(f"packaging={version}")
          if pip_version != "25.0":
              raise SystemExit(f"Expected pip 25.0, got {pip_version}")
          if version != "25.0":
              raise SystemExit(f"Expected packaging 25.0, got {version}")
          PY
