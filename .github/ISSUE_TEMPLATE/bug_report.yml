---

name: Bug Report
description: Report a reproducible defect in python-bootstrap.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail to reproduce the problem in a workflow or on a clean checkout.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
      placeholder: A short description of the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Provide exact commands, config, and sample inputs needed to reproduce the bug.
      placeholder: |
        1. Use Dagitali/python-bootstrap@... in a workflow with ...
        2. Run the workflow on ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste the failing workflow log output or assertion.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: python-bootstrap version
      description: Release tag, branch, or commit SHA used in the workflow.
      placeholder: v0.3.4
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Requested Python version and actual `python --version` output, if Python started.
      placeholder: Python 3.13.2
    validations:
      required: true
  - type: dropdown
    id: usage-mode
    attributes:
      label: Usage mode
      description: How was python-bootstrap used?
      options:
        - "uses: Dagitali/python-bootstrap@v1"
        - "uses: Dagitali/python-bootstrap@<version tag>"
        - "uses: Dagitali/python-bootstrap@<commit SHA>"
        - "uses: ./ from a checkout"
        - other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the current default branch or latest release.
          required: true
