#
# GitHub issue template configuration.
#
# Responsibilities
# - Disable blank issues and direct users toward the supported support paths.
#
# Maintainer Notes
# - Keep these links aligned with the repository's current Discussions and
#   security-reporting surfaces.
#
# References
# - GitHub issue template configuration documentation: https://docs.github.com/en/issues/tracking-your-work-with-issues/configuring-issue-templates-for-your-repository
# - GitHub issue forms configuration reference: https://docs.github.com/en/issues/tracking-your-work-with-issues/creating-issue-forms-for-your-repository/configuring-issue-forms-for-your-repository

---

blank_issues_enabled: false
contact_links:
  - name: Questions and usage help
    url: https://github.com/Dagitali/python-bootstrap/discussions
    about: Use GitHub Discussions for usage help, docs feedback, and design questions.
  - name: Security disclosures
    url: https://github.com/Dagitali/python-bootstrap/security/policy
    about: Report security issues privately under the repository security policy.
