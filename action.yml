# python-bootstrap
#
# Copyright © 2026 Dagitali LLC. All rights reserved.
#
# Composite GitHub Action for Python bootstrap in Python project workflows.
#
# Responsibilities
# - Install the requested Python runtime.
# - Optionally normalize pip by upgrading to the latest version or installing a
#   requested pip version.
# - Optionally install the requested dependency set for the calling job.
#
# Maintainer Notes
# - External GitHub Actions are pinned to full commit SHAs to reduce supply-
#   chain risk.
#
# References
# - GitHub composite action guide: https://docs.github.com/en/actions/creating-actions/creating-a-composite-action
# - GitHub Actions metadata reference: https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions

---

name: Setup Python and Install Dependencies

description: >-
  Sets up the requested Python runtime, optionally normalizes pip, and
  optionally installs the provided dependency list to keep workflow jobs
  consistent.

inputs:
  python-version:
    description: Python version to install via actions/setup-python
    required: true

  pip-version:
    description: Exact pip version to install instead of upgrading to latest.
    required: false
    default: ''

  pip-install:
    description: >-
      Arguments passed to "python -m pip install". Empty skips dependency
      installation.
    required: false
    default: ''

  upgrade-pip:
    description: >-
      Upgrade pip to the latest available version before installing
      dependencies. Ignored when pip-version is set.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # Pinned v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Normalize pip
      shell: bash
      env:
        PIP_VERSION: ${{ inputs.pip-version }}
        UPGRADE_PIP: ${{ inputs.upgrade-pip }}
      run: |
        set -euo pipefail

        if [[ -n "$PIP_VERSION" ]]; then
          python -m pip install "pip==$PIP_VERSION"
          exit 0
        fi

        case "$UPGRADE_PIP" in
          true)
            python -m pip install --upgrade pip
            ;;
          false)
            echo 'Skipping pip upgrade.'
            ;;
          *)
            echo 'upgrade-pip must be "true" or "false".' >&2
            exit 2
            ;;
        esac

    - name: Show Python environment
      shell: bash
      run: |
        set -euo pipefail

        python --version
        python -m pip --version

    - name: Install dependencies
      shell: bash
      env:
        PIP_INSTALL_ARGS: ${{ inputs.pip-install }}
      run: |
        set -euo pipefail
        set -f

        pip_install_args="$PIP_INSTALL_ARGS"
        if [[ -z "$pip_install_args" ]]; then
          echo 'Skipping dependency installation.'
          exit 0
        fi

        python -m pip install $pip_install_args
